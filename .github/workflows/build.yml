name: Build and verify

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "esbuild.config.mjs"
      - "tsconfig.json"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "esbuild.config.mjs"
      - "tsconfig.json"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build
